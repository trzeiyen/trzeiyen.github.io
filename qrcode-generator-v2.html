<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code 產生器（防 App 攔截版）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --paper: #EEF1EF;
    --ink: #1B2430;
    --pine: #2F6F6B;
    --mustard: #E3A94B;
    --coral: #C1585B;
    --line: #D8DBD6;
    --muted: #6B716D;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--paper);
    font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 440px;
    background: #FFFFFF;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 32px 28px;
  }
  h1 {
    font-family: 'Noto Serif TC', 'Songti TC', serif;
    font-size: 20px;
    font-weight: 700;
    margin: 0 0 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h1::before {
    content: "";
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--mustard);
    display: inline-block;
  }
  .sub {
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 22px;
    line-height: 1.6;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  label:first-of-type { margin-top: 0; }
  .hint {
    font-size: 11.5px;
    color: var(--muted);
    margin: -3px 0 6px;
  }
  input[type="text"] {
    width: 100%;
    padding: 11px 12px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--pine); }
  .btn {
    width: 100%;
    margin-top: 20px;
    padding: 11px 12px;
    border: none;
    border-radius: 8px;
    background: var(--ink);
    color: #F5F3EC;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.98); }
  .btn.secondary {
    background: #FFFFFF;
    color: var(--pine);
    border: 1.5px solid var(--pine);
    margin-top: 10px;
  }
  .result {
    margin-top: 24px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .result.show { display: flex; }
  #qrbox {
    padding: 16px;
    background: #FFFFFF;
    border: 1px solid var(--line);
    border-radius: 12px;
  }
  .final-url-label {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }
  .url-echo {
    font-size: 11px;
    color: var(--ink);
    word-break: break-all;
    text-align: center;
    padding: 8px 10px;
    background: var(--paper);
    border-radius: 6px;
    line-height: 1.5;
    width: 100%;
  }
  .warn {
    display: none;
    margin-top: 10px;
    font-size: 12px;
    color: var(--coral);
    background: #F6DEDD;
    border-left: 3px solid var(--coral);
    padding: 8px 10px;
    border-radius: 4px;
    line-height: 1.6;
  }
  .warn.show { display: block; }
</style>
</head>
<body>
  <div class="card">
    <h1>QR Code 產生器</h1>
    <p class="sub">先組成中繼跳轉網址，再產生 QR Code，掃描後才不會被 Claude App 攔截到聊天首頁。</p>

    <label for="baseInput">中繼跳轉頁網址（設定一次即可）</label>
    <div class="hint">你的 GitHub Pages 上的 redirect.html 網址，例如 https://your-name.github.io/redirect.html</div>
    <input type="text" id="baseInput" placeholder="https://your-name.github.io/redirect.html" value="https://trzeiyen.github.io/zeiyen.github.io/redirect.html" autocomplete="off" />

    <label for="targetInput">目標網址（Claude 發布的公開連結）</label>
    <div class="hint">在 Claude 按 Publish 後複製的連結</div>
    <input type="text" id="targetInput" placeholder="https://claude.ai/public/artifacts/..." autocomplete="off" />

    <div class="warn" id="warnBox"></div>

    <button class="btn" onclick="generate()">產生 QR Code</button>

    <div class="result" id="result">
      <div id="qrbox"></div>
      <div class="final-url-label">實際掃描後前往的網址</div>
      <div class="url-echo" id="urlEcho"></div>
      <button class="btn secondary" onclick="downloadPng()">下載圖片</button>
    </div>
  </div>

<script>
function isValidUrl(u) {
  return /^https?:\/\/.+/i.test(u);
}

function generate() {
  const base = document.getElementById('baseInput').value.trim();
  const target = document.getElementById('targetInput').value.trim();
  const warnBox = document.getElementById('warnBox');
  const resultBox = document.getElementById('result');

  if (!isValidUrl(base)) {
    warnBox.textContent = '請填入正確的中繼跳轉頁網址（需以 http:// 或 https:// 開頭）';
    warnBox.classList.add('show');
    resultBox.classList.remove('show');
    return;
  }
  if (!isValidUrl(target)) {
    warnBox.textContent = '請填入正確的目標網址（需以 http:// 或 https:// 開頭）';
    warnBox.classList.add('show');
    resultBox.classList.remove('show');
    return;
  }
  warnBox.classList.remove('show');

  const finalUrl = base + (base.includes('?') ? '&' : '?') + 'to=' + encodeURIComponent(target);

  const qrbox = document.getElementById('qrbox');
  qrbox.innerHTML = '';

  new QRCode(qrbox, {
    text: finalUrl,
    width: 220,
    height: 220,
    colorDark: '#1B2430',
    colorLight: '#FFFFFF',
    correctLevel: QRCode.CorrectLevel.M
  });

  document.getElementById('urlEcho').textContent = finalUrl;
  resultBox.classList.add('show');
}

function downloadPng() {
  const qrbox = document.getElementById('qrbox');
  const img = qrbox.querySelector('img');
  const canvas = qrbox.querySelector('canvas');

  let dataUrl;
  if (canvas) {
    dataUrl = canvas.toDataURL('image/png');
  } else if (img) {
    dataUrl = img.src;
  } else {
    return;
  }

  const link = document.createElement('a');
  link.href = dataUrl;
  link.download = 'qrcode.png';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

['baseInput', 'targetInput'].forEach(function(id) {
  document.getElementById(id).addEventListener('keydown', function(e) {
    if (e.key === 'Enter') generate();
  });
});
</script>
</body>
</html>
